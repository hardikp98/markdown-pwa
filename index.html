<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Markdown">
<meta name="theme-color" content="#0f1420">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="hljs-theme.css" id="hljsTheme">
<title>Markdown</title>
<script src="marked.min.js"></script>
<script src="purify.min.js"></script>
<script src="hljs.min.js"></script>
<style>
  :root{
    --bg:#0f1420;--panel:#131a2a;--bar:#0c111c;--gutter:#0c1119;--chip:#1b2336;
    --fg:#c9d4e3;--muted:#6b7890;--label:#7c89a3;--head:#fff;
    --accent:#6c8cff;--accent2:#8a6cff;--border:#222c40;--codebg:#0b1019;
    --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  }
  html[data-theme="light"]{--bg:#fff;--panel:#f6f8fa;--bar:#eef1f4;--chip:#e7ebf0;--fg:#24292f;--muted:#6b7280;--label:#57606a;--head:#1a1d21;--accent:#0969da;--accent2:#5a3fd6;--border:#d0d7de;--codebg:#f3f5f8;}
  html[data-theme="matrix"]{--bg:#000;--panel:#020802;--bar:#000;--chip:#04210c;--fg:#00ff66;--muted:#089a3f;--label:#0a7a33;--head:#9dffae;--accent:#00ff66;--accent2:#00aa44;--border:#0c2c14;--codebg:#010601;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);
            -webkit-text-size-adjust:100%}
  html{height:100%}
  /* --app-h is set in JS from visualViewport so the shell shrinks to the area
     ABOVE the iOS keyboard. Falls back to dvh, then % for older browsers.
     This is what keeps the top bars from scrolling off when the keyboard opens. */
  body{height:100%;height:100dvh;height:var(--app-h,100dvh);display:flex;flex-direction:column;padding-top:var(--safe-top);
       position:fixed;top:0;left:0;right:0;overflow:hidden}
  /* top bar */
  #bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bar);border-bottom:1px solid var(--border);flex:0 0 auto}
  #docname{flex:1;font-size:14px;font-weight:600;color:var(--head);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #sync{font-size:11px;color:var(--muted);flex:0 0 auto;white-space:nowrap;min-width:0}
  #sync.saved{color:var(--accent)} #sync.error{color:#f48771}
  #bar button{background:var(--chip);border:1px solid var(--border);color:var(--fg);border-radius:9px;padding:8px;display:flex;cursor:pointer}
  #bar button svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #bar button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff}
  /* segmented edit/preview toggle */
  #seg{display:flex;background:var(--chip);border-radius:9px;padding:2px;flex:0 0 auto}
  #seg button{background:transparent;border:0;color:var(--muted);font-size:13px;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer}
  #seg button.active{background:var(--bg);color:var(--fg)}
  /* formatting toolbar (scrolls horizontally) */
  #tools{display:flex;gap:2px;padding:6px 10px;background:var(--bar);border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;-webkit-overflow-scrolling:touch}
  #tools button{background:transparent;border:0;color:var(--fg);border-radius:7px;padding:9px;display:flex;flex:0 0 auto;cursor:pointer}
  #tools button:active{background:var(--chip)}
  #tools button svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #tools button svg .fillc{fill:currentColor;stroke:none}
  #tools .sep{width:1px;background:var(--border);margin:4px 5px;flex:0 0 auto}
  /* symbol inserter row */
  #symBar{display:flex;gap:4px;padding:6px 10px;background:var(--bar);border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;-webkit-overflow-scrolling:touch}
  .symBtn{background:var(--chip);border:1px solid var(--border);color:var(--fg);border-radius:8px;font-size:18px;padding:6px 12px;flex:0 0 auto;cursor:pointer;line-height:1}
  .symBtn:active{filter:brightness(1.2)}
  /* tappable task checkboxes in preview */
  #pv input[type="checkbox"]{accent-color:var(--accent);margin-right:8px;vertical-align:-2px}
  #pv li.task-list-item{list-style:none}
  #pv ul:has(li.task-list-item){padding-left:.4em}
  /* panes */
  #main{flex:1 1 auto;min-height:0;position:relative}
  #src,#pv{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch}
  #src{border:0;resize:none;width:100%;height:100%;background:var(--panel);color:var(--fg);
       font-family:ui-monospace,Menlo,monospace;font-size:16px;line-height:1.6;padding:16px;outline:none;
       white-space:pre-wrap;overflow-wrap:break-word}
  #pv{padding:16px 18px calc(40px + var(--safe-bot));font-size:16px;line-height:1.6;display:none;overflow-wrap:break-word;word-break:break-word}
  body.view-preview #src{display:none}
  body.view-preview #pv{display:block}
  #pv h1{font-size:1.8em;font-weight:700;margin:.2em 0 .4em;border-bottom:1px solid var(--border);padding-bottom:.3em}
  #pv h2{font-size:1.4em;font-weight:700;margin:1.1em 0 .45em;border-bottom:1px solid var(--border);padding-bottom:.25em}
  #pv h3{font-size:1.18em;font-weight:600;margin:1em 0 .4em}
  #pv h1,#pv h2,#pv h3{color:var(--head);line-height:1.3}
  #pv p{margin:0 0 .8em} #pv a{color:var(--accent)}
  #pv ul,#pv ol{margin:0 0 .8em;padding-left:1.4em} #pv li{margin:.25em 0}
  #pv strong{color:var(--head)}
  #pv mark{background:var(--accent);color:#0b0b0b;padding:.5px 4px;border-radius:3px}
  #pv code{background:var(--chip);padding:2px 6px;border-radius:5px;font-size:.86em;font-family:ui-monospace,Menlo,monospace}
  #pv pre{background:var(--codebg);padding:14px;border-radius:10px;overflow-x:auto;border:1px solid var(--border);margin:0 0 1.2em}
  #pv pre code{background:0;padding:0}
  #pv blockquote{border-left:3px solid var(--accent);margin:0 0 1em;padding:.2em 0 .2em 14px;color:var(--muted)}
  #pv table{border-collapse:collapse;display:block;overflow-x:auto;max-width:100%;margin:0 0 1em} #pv th,#pv td{border:1px solid var(--border);padding:7px 10px}
  #pv hr{border:0;border-top:1px solid var(--border);margin:1.6em 0}
  #pv img{max-width:100%}
  /* left drawer (doc list + sources + settings) */
  #scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:opacity .22s,visibility .22s;z-index:40}
  #scrim.open{opacity:1;visibility:visible}
  .sheet{position:fixed;top:0;bottom:0;left:0;width:86%;max-width:360px;z-index:50;background:var(--panel);
         border-right:1px solid var(--border);box-shadow:6px 0 24px rgba(0,0,0,.35);
         padding-top:var(--safe-top);transform:translateX(-100%);transition:transform .24s ease;
         display:flex;flex-direction:column}
  .sheet.open{transform:translateX(0)}
  .sheet h3{margin:0;font-size:17px;font-weight:700;color:var(--head)}
  /* #docList is the real flex child of .sheet — it must carry the column layout */
  #docList{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
  /* drawer regions: head (fixed) · docs list (scrolls/grows) · footer groups (pinned) */
  .drawerTop{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 12px;touch-action:pan-y}
  .drawerBot{flex:0 0 auto;border-top:1px solid var(--border);padding:8px 12px calc(12px + var(--safe-bot));overflow-y:auto;max-height:42%;touch-action:pan-y}
  .sheetHead{display:flex;align-items:center;justify-content:space-between;padding:14px 4px 12px;position:sticky;top:0;background:var(--panel);z-index:1}
  .newBtnSheet{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff;
               font-size:14px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer}
  .newBtnSheet svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  .sheetLabel{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--label);margin:18px 6px 6px}
  .sheetGroup{background:var(--bg);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .sheetGroup .docItem{border-bottom:1px solid var(--border)}
  .sheetGroup .docItem:last-child{border-bottom:0}
  .docItem{display:flex;align-items:center;gap:10px;padding:13px 12px;cursor:pointer;font-size:15px}
  .docItem:active{background:var(--chip)}
  .docItem.active{background:var(--chip)}
  .docItem>span:first-child{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .docItem.active>span:first-child{color:var(--accent);font-weight:600}
  .docItem svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;color:var(--muted)}
  /* Drive folder-browser: pinned nav at top, scrollable list below */
  .drawerPin{flex:0 0 auto;padding:8px 12px 6px}
  .gnav{display:flex;align-items:center;gap:6px}
  .gNavBtn{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;
       background:var(--chip);border:1px solid var(--border);border-radius:9px;color:var(--fg);cursor:pointer}
  .gNavBtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .gNavBtn:active{filter:brightness(1.2)}
  .gNavBtn:disabled{opacity:.35;cursor:default}
  .gCrumb{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
       font-size:13px;font-weight:600;color:var(--head);text-align:center;padding:0 4px}
  .docItem .meta{flex:0 0 auto;color:var(--muted);font-size:12px;margin-left:auto}
  .docItem .meta{flex:0 0 auto;font-size:12px;color:var(--muted)}
  .docItem .dx{flex:0 0 auto;color:var(--muted);padding:4px 6px}
  .docItem .dx svg{width:17px;height:17px}
  .empty{padding:18px 12px;color:var(--muted);font-size:14px;text-align:center}
  .empty{padding:18px 12px;color:var(--muted);font-size:14px;text-align:center}
  #status{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + var(--safe-bot));z-index:60;
          background:var(--accent);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
  #status.show{opacity:1}
</style>
</head>
<body>
  <div id="bar">
    <button id="menuBtn" title="Menu"></button>
    <button id="newBtn" title="New document"></button>
    <div id="docname">Untitled</div>
    <span id="sync" class="sync"></span>
    <div id="seg">
      <button id="segEdit" class="active">Edit</button>
      <button id="segView">View</button>
    </div>
    <button id="saveBtn" class="primary" title="Save / Export"></button>
  </div>
  <div id="tools"></div>
  <div id="main">
    <textarea id="src" placeholder="# Start typing markdown…" autocapitalize="sentences" autocorrect="on"></textarea>
    <div id="pv"></div>
  </div>

  <div id="scrim"></div>
  <div id="docsSheet" class="sheet"><div id="docList"></div></div>
  <div id="status"></div>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" style="display:none">

<script src="config.js"></script>
<script src="cloud.js"></script>
<script src="app.js"></script>
</body>
</html>
